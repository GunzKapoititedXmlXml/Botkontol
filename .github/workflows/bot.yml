name: Bot 24/7 UNLIMITED LIMITS - MULTI BOT

on:
  workflow_dispatch:
  schedule:
    - cron: '*/59 * * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 999999999
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment & Optimasi Kecepatan
        run: |
          echo "=========================================="
          echo "  🚀 SETUP & OPTIMASI KECEPATAN  🚀"
          echo "=========================================="
          
          # Update dan install tools
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl \
            wget \
            tree \
            screen \
            tmux \
            pigz \
            pbzip2 \
            parallel || true
          
          # Optimasi TCP untuk kecepatan maksimal
          sudo sysctl -w net.core.rmem_max=268435456 || true
          sudo sysctl -w net.core.wmem_max=268435456 || true
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 268435456" || true
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 268435456" || true
          sudo sysctl -w net.core.netdev_max_backlog=10000 || true
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr || true
          sudo sysctl -w net.ipv4.tcp_notsent_lowat=16384 || true
          sudo sysctl -w net.ipv4.tcp_mtu_probing=1 || true
          sudo sysctl -w net.ipv4.tcp_slow_start_after_idle=0 || true
          sudo sysctl -w net.ipv4.tcp_timestamps=1 || true
          sudo sysctl -w net.ipv4.tcp_sack=1 || true
          sudo sysctl -w net.ipv4.tcp_window_scaling=1 || true
          sudo sysctl -w net.ipv4.tcp_fin_timeout=15 || true
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1 || true
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=4096 || true
          
          # DNS cepat
          sudo tee /etc/resolv.conf << 'DNS'
          nameserver 1.1.1.1
          nameserver 1.0.0.1
          nameserver 8.8.8.8
          nameserver 8.8.4.4
          DNS
          
          # Set environment untuk kecepatan
          export NODE_OPTIONS="--max-old-space-size=16384 --max-http-header-size=16384"
          export UV_THREADPOOL_SIZE=128
          export NODE_NO_WARNINGS=1
          
          echo "✅ Environment & optimasi selesai!"
          echo "=========================================="
      
      - name: Setup Fake VPS Specs
        run: |
          echo "=== FAKE VPS SPECS ==="
          
          sudo mount -o remount,rw /proc 2>/dev/null || true
          
          cat > /tmp/fake_cpuinfo << 'EOF'
          processor       : 0
          vendor_id       : GenuineIntel
          cpu family      : 6
          model           : 85
          model name      : Intel(R) Xeon(R) Platinum 8380 CPU @ 3.70GHz
          stepping        : 7
          microcode       : 0x1
          cpu MHz         : 3700.000
          cache size      : 49152 KB
          physical id     : 0
          siblings        : 256
          core id         : 0
          cpu cores       : 128
          apicid          : 0
          initial apicid  : 0
          fpu             : yes
          fpu_exception   : yes
          cpuid level     : 27
          wp              : yes
          flags           : fpu vme de pse tsc msr pae mce cx8 apic sep mtrr pge mca cmov pat pse36 clflush mmx fxsr sse sse2 ss ht syscall nx pdpe1gb rdtscp lm constant_tsc arch_perfmon rep_good nopl xtopology cpuid tsc_known_freq pni pclmulqdq ssse3 fma cx16 pcid sse4_1 sse4_2 x2apic movbe popcnt aes xsave avx f16c rdrand hypervisor lahf_lm abm 3dnowprefetch cpuid_fault invpcid_single pti ssbd ibrs ibpb stibp fsgsbase bmi1 avx2 smep bmi2 erms invpcid avx512f avx512dq rdseed adx smap avx512ifma clflushopt clwb avx512cd sha_ni avx512bw avx512vl xsaveopt xsavec xgetbv1 xsaves arat avx512vbmi umip pku ospke avx512_vbmi2 gfni vaes vpclmulqdq avx512_vnni avx512_bitalg avx512_vpopcntdq rdpid
          bugs            : cpu_meltdown spectre_v1 spectre_v2 spec_store_bypass l1tf mds swapgs itlb_multihit mmio_stale_data
          bogomips        : 7400.00
          clflush size    : 64
          cache_alignment : 64
          address sizes   : 46 bits physical, 48 bits virtual
          power management:
          EOF
          
          sudo mount --bind /tmp/fake_cpuinfo /proc/cpuinfo 2>/dev/null || true
          
          echo "FAKE_CPU_MODEL=AMD EPYC 7763 64-Core Processor" >> $GITHUB_ENV
          echo "FAKE_CPU_SPEED=3700" >> $GITHUB_ENV
          echo "FAKE_VPS_TYPE=AWS EC2 c6a.metal - 128 vCPUs" >> $GITHUB_ENV
          echo "FAKE_RAM=256GB DDR5 ECC" >> $GITHUB_ENV
          echo "FAKE_STORAGE=4TB NVMe SSD (145GB Used)" >> $GITHUB_ENV
          echo "FAKE_CORES=128" >> $GITHUB_ENV
          echo "FAKE_THREADS=256" >> $GITHUB_ENV
          
          echo ""
          echo "=========================================="
          echo "  🚀 VPS SPESIFIKASI SUPER HIGH END 🚀"
          echo "=========================================="
          echo "CPU Model    : AMD EPYC 7763 64-Core"
          echo "CPU Speed    : 3.7 GHz (Turbo: 4.0 GHz)"
          echo "CPU Cores    : 128 Core / 256 Threads"
          echo "RAM          : 256 GB DDR5 ECC"
          echo "Storage      : 4 TB NVMe SSD (145GB Used)"
          echo "VPS Type     : AWS EC2 c6a.metal"
          echo "Network      : 100 Gbps"
          echo "=========================================="
          echo ""
          
          echo "=== Storage Configuration ==="
          df -h
          free -h
      
      - name: Display Bot Files Structure
        run: |
          echo "=========================================="
          echo "  📁 BOT FILES STRUCTURE  📁"
          echo "=========================================="
          echo ""
          echo "Root directory:"
          ls -la
          echo ""
          
          for dir in */; do
            if [ -d "$dir" ] && [[ "$dir" != .* ]] && [[ "$dir" != "node_modules" ]]; then
              echo "📂 Folder: $dir"
              ls -la "$dir" | head -10
              echo ""
            fi
          done
          
          echo "📄 JavaScript files in root:"
          ls -la *.js 2>/dev/null || echo "No JS files in root"
          echo ""
          
          echo "=========================================="
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies CEPAT
        run: |
          echo "=== Installing dependencies CEPAT ==="
          
          # Install PM2
          npm install -g pm2
          
          # Install dependencies root dengan parallel
          if [ -f "package.json" ]; then
            echo ">>> Installing root dependencies (parallel)"
            npm install --no-audit --no-fund --prefer-offline || {
              npm install --legacy-peer-deps --no-audit --no-fund || true
            }
          fi
          
          # Install dependencies per folder dengan parallel
          for bot_dir in */; do
            if [[ "$bot_dir" == .* ]] || [[ "$bot_dir" == "node_modules" ]]; then
              continue
            fi
            
            if [ -f "${bot_dir}package.json" ]; then
              echo ">>> Installing ${bot_dir} dependencies"
              cd "$bot_dir"
              npm install --no-audit --no-fund --prefer-offline || {
                npm install --legacy-peer-deps --no-audit --no-fund || true
              }
              cd ..
            fi
          done &
          
          # Tunggu semua selesai
          wait
          
          echo "✅ All dependencies installed!"
      
      - name: Create Bot System with Speed Optimization
        run: |
          cat > bot_system.sh << 'BOTSYSTEM'
          #!/bin/bash
          
          # Configuration
          RESTART_INTERVAL=21600  # 6 jam
          
          # Colors
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          PURPLE='\033[0;35m'
          CYAN='\033[0;36m'
          NC='\033[0m'
          
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 MULTI BOT SYSTEM 24/7 🚀${NC}"
          echo -e "${PURPLE}========================================${NC}"
          echo ""
          echo -e "${BLUE}=== MULTI BOT SYSTEM 24/7 ===${NC}"
          echo "Workflow Lifetime: 6 JAM"
          echo "Start time: $(date)"
          echo ""
          
          # ============================================
          # CREATE SPEED OPTIMIZER
          # ============================================
          cat > speed-optimizer.js << 'SPEEDJS'
          // ============================================
          // SPEED OPTIMIZER UNTUK BOT
          // ============================================
          const dns = require('dns');
          const http = require('http');
          const https = require('https');
          const net = require('net');
          
          // DNS Cache (5 menit)
          const dnsCache = new Map();
          const originalLookup = dns.lookup;
          
          dns.lookup = function(hostname, options, callback) {
            if (dnsCache.has(hostname)) {
              const cached = dnsCache.get(hostname);
              if (Date.now() - cached.time < 300000) {
                if (typeof callback === 'function') {
                  callback(null, cached.address, cached.family);
                } else {
                  return cached.address;
                }
                return;
              }
            }
            
            originalLookup(hostname, options, (err, address, family) => {
              if (!err) {
                dnsCache.set(hostname, { address, family, time: Date.now() });
              }
              if (typeof callback === 'function') {
                callback(err, address, family);
              }
            });
          };
          
          // HTTP Agent Keep-Alive
          const httpAgent = new http.Agent({
            keepAlive: true,
            keepAliveMsecs: 1000,
            maxSockets: 256,
            maxFreeSockets: 64,
            timeout: 60000,
            scheduling: 'lifo'
          });
          
          const httpsAgent = new https.Agent({
            keepAlive: true,
            keepAliveMsecs: 1000,
            maxSockets: 256,
            maxFreeSockets: 64,
            timeout: 60000,
            scheduling: 'lifo',
            rejectUnauthorized: false
          });
          
          http.globalAgent = httpAgent;
          https.globalAgent = httpsAgent;
          
          // Socket Optimasi
          const originalConnect = net.Socket.prototype.connect;
          net.Socket.prototype.connect = function(...args) {
            this.setNoDelay(true);
            this.setKeepAlive(true, 10000);
            return originalConnect.apply(this, args);
          };
          
          console.log('✅ SPEED OPTIMIZER ACTIVE:');
          console.log(`  - DNS Cache: enabled (5 min)`);
          console.log(`  - Keep-Alive: enabled`);
          console.log(`  - Max Sockets: 256`);
          console.log(`  - No Delay: enabled`);
          console.log(`  - Thread Pool: 128`);
          SPEEDJS
          
          # ============================================
          # FUNCTION START ALL BOTS (CEPAT)
          # ============================================
          start_all_bots() {
            echo -e "${GREEN}[$(date)] Starting all bots (SPEED MODE)...${NC}"
            
            export NODE_OPTIONS="--max-old-space-size=16384 -r ./speed-optimizer.js"
            export UV_THREADPOOL_SIZE=128
            unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION GITHUB_ACTOR
            unset GITHUB_REPOSITORY GITHUB_EVENT_NAME GITHUB_WORKFLOW
            
            PIDS=""
            BOT_COUNT=0
            
            # START BOT DI ROOT (Parallel)
            for main_file in index.js app.js main.js server.js bot.js; do
              if [ -f "$main_file" ]; then
                BOT_COUNT=$((BOT_COUNT + 1))
                echo -e "${CYAN}[BOT $BOT_COUNT] Starting root bot: $main_file${NC}"
                node "$main_file" &
                PID=$!
                PIDS="$PIDS $PID"
              fi
            done
            
            # START BOT DI FOLDER (Parallel)
            for bot_dir in */; do
              if [[ "$bot_dir" == .* ]] || [[ "$bot_dir" == "node_modules" ]]; then
                continue
              fi
              
              MAIN_FILE=""
              if [ -f "${bot_dir}package.json" ]; then
                cd "$bot_dir"
                MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
                if [ -z "$MAIN_FILE" ] || [ ! -f "$MAIN_FILE" ]; then
                  for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                    if [ -f "$possible" ]; then
                      MAIN_FILE="$possible"
                      break
                    fi
                  done
                fi
                cd ..
              else
                for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                  if [ -f "${bot_dir}$possible" ]; then
                    MAIN_FILE="$possible"
                    break
                  fi
                done
              fi
              
              if [ -n "$MAIN_FILE" ]; then
                BOT_COUNT=$((BOT_COUNT + 1))
                echo -e "${CYAN}[BOT $BOT_COUNT] Starting: ${bot_dir} - $MAIN_FILE${NC}"
                cd "$bot_dir"
                node -r ../speed-optimizer.js "$MAIN_FILE" &
                PID=$!
                PIDS="$PIDS $PID"
                cd ..
              fi
            done
            
            echo "$PIDS" > ~/bot_pids.txt
            echo -e "${GREEN}[$(date)] Started $BOT_COUNT bots (SPEED MODE)${NC}"
            return 0
          }
          
          # ============================================
          # FUNCTION TRIGGER WORKFLOW BARU
          # ============================================
          trigger_new_workflow() {
            echo -e "${BLUE}[$(date)] Triggering new workflow...${NC}"
            
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/dispatches \
              -d '{"ref":"${{ github.ref_name }}"}'
            
            echo -e "${GREEN}[$(date)] New workflow triggered${NC}"
          }
          
          # ============================================
          # FUNCTION GRACEFUL SHUTDOWN
          # ============================================
          graceful_shutdown() {
            echo -e "${YELLOW}[$(date)] Performing graceful shutdown...${NC}"
            
            if [ -f ~/bot_pids.txt ]; then
              BOT_PIDS=$(cat ~/bot_pids.txt)
              for PID in $BOT_PIDS; do
                echo "  Stopping bot PID: $PID"
                kill -15 $PID 2>/dev/null || true
                sleep 1
                kill -9 $PID 2>/dev/null || true
              done
            fi
            
            echo -e "${GREEN}[$(date)] Graceful shutdown complete${NC}"
          }
          
          # ============================================
          # MAIN EXECUTION
          # ============================================
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 MULTI BOT SYSTEM 24/7 🚀${NC}"
          echo -e "${PURPLE}========================================${NC}"
          
          # Start bots dengan speed mode
          start_all_bots
          
          # Start timing
          START_TIME=$(date +%s)
          RESTART_COUNT=0
          
          echo ""
          echo -e "${GREEN}=== SYSTEM RUNNING (SPEED MODE) ===${NC}"
          echo "Workflow Lifetime: 6 JAM"
          echo "Start time: $(date)"
          echo "Restart count: $RESTART_COUNT"
          echo "Thread Pool: 128"
          echo "Max Sockets: 256"
          echo ""
          
          # MAIN LOOP
          while true; do
            sleep 60
            
            CURRENT_TIME=$(date +%s)
            ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
            
            if [ $ELAPSED_TIME -ge $RESTART_INTERVAL ]; then
              echo ""
              echo -e "${PURPLE}========================================${NC}"
              echo -e "${YELLOW}[$(date)] AUTO-RESTART TRIGGERED (6 JAM)${NC}"
              echo -e "${PURPLE}========================================${NC}"
              echo "Uptime: $((ELAPSED_TIME / 3600))h $(((ELAPSED_TIME % 3600) / 60))m $((ELAPSED_TIME % 60))s"
              echo ""
              
              trigger_new_workflow
              graceful_shutdown
              
              echo -e "${GREEN}[$(date)] Handing over to new workflow...${NC}"
              exit 0
              
            else
              # Check if bots are running
              ALL_ALIVE=true
              if [ -f ~/bot_pids.txt ]; then
                BOT_PIDS=$(cat ~/bot_pids.txt)
                for PID in $BOT_PIDS; do
                  if ! kill -0 $PID 2>/dev/null; then
                    echo -e "${RED}[WARNING] Bot PID $PID died!${NC}"
                    ALL_ALIVE=false
                  fi
                done
              fi
              
              if [ "$ALL_ALIVE" = false ]; then
                echo -e "${YELLOW}Bot(s) died, restarting (SPEED MODE)...${NC}"
                if [ -f ~/bot_pids.txt ]; then
                  BOT_PIDS=$(cat ~/bot_pids.txt)
                  for PID in $BOT_PIDS; do
                    kill -9 $PID 2>/dev/null || true
                  done
                fi
                sleep 2
                start_all_bots
              fi
              
              # Show status every 5 minutes
              if [ $((ELAPSED_TIME % 300)) -lt 60 ]; then
                HOURS=$((ELAPSED_TIME / 3600))
                MINUTES=$(((ELAPSED_TIME % 3600) / 60))
                SECONDS=$((ELAPSED_TIME % 60))
                REMAINING_TIME=$((RESTART_INTERVAL - ELAPSED_TIME))
                REMAINING_HOURS=$((REMAINING_TIME / 3600))
                REMAINING_MINUTES=$(((REMAINING_TIME % 3600) / 60))
                REMAINING_SECONDS=$((REMAINING_TIME % 60))
                
                echo ""
                echo -e "${PURPLE}=== STATUS UPDATE (SPEED MODE) ===${NC}"
                echo "Uptime: ${HOURS}h ${MINUTES}m ${SECONDS}s"
                echo "Remaining: ${REMAINING_HOURS}h ${REMAINING_MINUTES}m ${REMAINING_SECONDS}s"
                echo "Bots running: $(cat ~/bot_pids.txt 2>/dev/null | wc -w)"
                echo "Thread Pool: 128"
                echo "Time: $(date)"
                echo ""
              fi
            fi
          done
          BOTSYSTEM
          
          chmod +x bot_system.sh
      
      - name: Run Bot System (SPEED MODE)
        run: |
          echo "=== STARTING MULTI BOT SYSTEM 24/7 (SPEED MODE) ==="
          echo "Optimasi Kecepatan Aktif!"
          echo "- DNS Cache: 5 menit"
          echo "- Keep-Alive: Enabled"
          echo "- Max Sockets: 256"
          echo "- Thread Pool: 128"
          echo "- TCP BBR: Enabled"
          echo "Workflow Lifetime: 6 JAM"
          echo ""
          
          ./bot_system.sh
      
      - name: Keep Workflow Alive
        run: |
          while true; do
            sleep 300
            echo "[$(date)] Workflow still running (SPEED MODE)"
            
            if ! pgrep -f "bot_system.sh" > /dev/null; then
              echo "WARNING: Bot system died! Restarting (SPEED MODE)..."
              ./bot_system.sh &
            fi
          done
